name: Semgrep Cloud Integration

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  semgrep-scan:
    runs-on: ubuntu-latest

    # 必須確保 Runner 伺服器上已經裝好 Python 與 pip install semgrep
    steps:
      # 1. 取得程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 準備 Python 環境 (Semgrep 需要依賴 Python 執行)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安裝 Semgrep 引擎
      - name: Install Semgrep
        run: pip install semgrep

      # 4. 執行掃描 (您原本卡住的地方)
      - name: Run Semgrep CI
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
