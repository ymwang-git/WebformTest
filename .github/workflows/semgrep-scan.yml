name: Semgrep Cloud Integration

on:
  # 1. 保留手動觸發按鈕 (您原本能成功執行的原因)
  workflow_dispatch: 

  # 2. 當 Push 到這些分支時自動觸發 (涵蓋 main, master 與 dev)
  push:
    branches: 
      - main
      - master
      - dev
      - 'feature/**' # 涵蓋所有 feature/ 開頭的分支

  # 3. 當發起 PR「準備合併進」這些分支時自動觸發
  pull_request:
    branches: 
      - main
      - master
      - dev

jobs:
  semgrep-scan:
    name: 執行 Semgrep 掃描並上傳結果
    runs-on: self-hosted # 使用您的地端 Runner

    # 必須確保 Runner 伺服器上已經裝好 Python 與 pip install semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 執行雲端連線版本的掃描指令
      - name: Run Semgrep CI
        run: semgrep ci
        env:
          # 將剛剛設定的 Secret 注入環境變數，讓 CLI 能通過身分驗證
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
