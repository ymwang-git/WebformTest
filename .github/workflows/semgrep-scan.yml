name: Semgrep Cloud Integration

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  semgrep-scan:
    name: 執行 Semgrep 掃描並上傳結果
    runs-on: ubuntu-latest #runs-on: self-hosted # 使用您的地端 Runner

    # 必須確保 Runner 伺服器上已經裝好 Python 與 pip install semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 執行雲端連線版本的掃描指令
      - name: Run Semgrep CI
        run: semgrep ci
        env:
          # 將剛剛設定的 Secret 注入環境變數，讓 CLI 能通過身分驗證
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
